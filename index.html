<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usman App Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#1db954,#0d6efd);
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

header h2{
font-size:28px;
}

.search-box input{
padding:10px 15px;
width:250px;
border:none;
border-radius:25px;
outline:none;
}

.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(135deg,#1db954,#0d6efd);
}

.hero h1{
font-size:50px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
margin-bottom:20px;
}

.hero button{
padding:12px 30px;
border:none;
border-radius:30px;
background:white;
color:#1db954;
font-weight:bold;
cursor:pointer;
}

.categories{
display:flex;
justify-content:center;
gap:15px;
padding:25px;
flex-wrap:wrap;
}

.categories button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#1e293b;
color:white;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.section-title{
margin-bottom:20px;
font-size:30px;
}

.app-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.app-card{
background:#1e293b;
border-radius:20px;
padding:20px;
text-align:center;
transition:.3s;
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

.app-card:hover{
transform:translateY(-10px);
}

.app-card img{
width:90px;
height:90px;
border-radius:20px;
}

.app-name{
margin-top:15px;
font-size:18px;
font-weight:bold;
}

.app-category{
color:#cbd5e1;
margin:8px 0;
}

.rating{
color:#facc15;
margin-bottom:10px;
}

.install-btn{
background:#1db954;
color:white;
border:none;
padding:10px 20px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
}

.install-btn:hover{
background:#17a34a;
}

footer{
margin-top:50px;
text-align:center;
padding:25px;
background:#111827;
color:#94a3b8;
}
</style>
</head>

<body>

<header>
<h2>🚀 Usman App Store</h2>

<div class="search-box">
<input type="text" placeholder="Search apps...">
</div>
</header>

<section class="hero">
<h1>Discover Amazing Apps</h1>
<p>Download the best apps, games and tools.</p>
<button>Explore Apps</button>
</section>

<div class="categories">
<button>🎮 Games</button>
<button>🎵 Music</button>
<button>📚 Education</button>
<button>🛠 Tools</button>
<button>📸 Photography</button>
</div>

<div class="container">

<h3 class="section-title">🔥 Popular Apps</h3>

<div class="app-grid">

<div class="app-card">
<img src="chh.jpg" alt="Chat App">
<div class="app-name">Chat App</div>
<div class="app-category">Communication</div>
<div class="rating">⭐ 4.8</div>
<button class="install-btn">Install</button>
</div>

<div class="app-card">
<img src="mu.jpg" alt="Music Player">
<div class="app-name">Music Player</div>
<div class="app-category">Music</div>
<div class="rating">⭐ 4.7</div>
<button class="install-btn">Install</button>
</div>

<div class="app-card">
<img src="pic.jpg" alt="Photo Editor">
<div class="app-name">Photo Editor</div>
<div class="app-category">Photography</div>
<div class="rating">⭐ 4.9</div>
<button class="install-btn">Install</button>
</div>

<div class="app-card">
<img src="gam.jpg" alt="Game Zone">
<div class="app-name">Game Zone</div>
<div class="app-category">Games</div>
<div class="rating">⭐ 4.8</div>
<button class="install-btn">Install</button>
</div>

</div>

</div>

<footer>
© 2026 Usman App Store | Built with HTML & CSS ❤️
</footer>

</body>
</html>
